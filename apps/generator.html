<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Market Data Generator - Modular</title>
    <style>
        /* CSS Custom Properties for Consistent Theming */
        :root {
            --bg-primary: linear-gradient(135deg, #0a0a15 0%, #0d1020 25%, #060d28 50%, #0d1020 75%, #0a0a15 100%);
            --bg-panel: rgba(255, 255, 255, 0.05);
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-primary: rgba(255, 255, 255, 0.1);
            --border-focus: rgba(0, 170, 255, 0.5);
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.6);
            
            --color-success: #00ff64;
            --color-primary: #00aaff;
            --color-warning: #ffaa00;
            --color-error: #ff4444;
            
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 32px;
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 12px;
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a15;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }
        
        /* Sharp geometric light rays */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                /* Primary ray - strongest */
                linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.12) 30%, rgba(255, 255, 255, 0.06) 60%, transparent 100%),
                /* Secondary rays */
                linear-gradient(140deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.08) 25%, rgba(255, 255, 255, 0.03) 50%, transparent 75%),
                linear-gradient(130deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.06) 25%, rgba(255, 255, 255, 0.02) 50%, transparent 75%);
            z-index: 1;
            pointer-events: none;
        }

        /* Typography */
        .title-main {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
            color: var(--text-primary);
        }

        .field-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        /* Layout */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
        }

        .generator-layout {
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 20px;
            align-items: start;
            position: relative;
            left: -50px;
        }

        @media (max-width: 1024px) {
            .generator-layout {
                grid-template-columns: 1fr;
                gap: var(--spacing-md);
            }
        }

        /* Panels */
        .panel {
            background: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: var(--spacing-md);
            border: 1px solid var(--border-primary);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--spacing-lg);
        }

        /* Form Controls */
        .form-group {
            margin-bottom: var(--spacing-md);
        }

        .form-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Style number input spinner buttons */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* Buttons */
        .btn {
            padding: 8px var(--spacing-md);
            border: 1px solid;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xs);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: rgba(0, 170, 255, 0.15);
            color: var(--color-primary);
            border-color: rgba(0, 170, 255, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: rgba(0, 170, 255, 0.25);
            transform: translateY(-1px);
        }

        .btn-success {
            background: rgba(0, 255, 100, 0.15);
            color: var(--color-success);
            border-color: rgba(0, 255, 100, 0.3);
        }

        .btn-success:hover:not(:disabled) {
            background: rgba(0, 255, 100, 0.25);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(100, 150, 255, 0.15);
            color: rgba(100, 150, 255, 0.9);
            border-color: rgba(100, 150, 255, 0.3);
        }

        .btn-warning {
            background: rgba(255, 170, 0, 0.15);
            color: var(--color-warning);
            border-color: rgba(255, 170, 0, 0.3);
        }

        .btn-warning:hover:not(:disabled) {
            background: rgba(255, 170, 0, 0.25);
            transform: translateY(-1px);
        }

        /* Symbol Cards CSS */
        .symbols-grid {
            display: grid;
            grid-template-columns: max-content max-content;
            gap: 20px;
        }

        .symbol-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transition: all 0.2s ease;
        }

        .symbol-header {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            margin-bottom: 6px;
            gap: 8px;
        }

        .symbol-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #ffffff;
        }

        .symbol-percentage-edit {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .percentage-input {
            width: 65px;
            padding: 6px 10px;
            background: rgba(0, 255, 100, 0.15);
            border: 2px solid rgba(0, 255, 100, 0.3);
            border-radius: 8px;
            color: #00ff64;
            font-size: 1rem;
            font-weight: 700;
            text-align: center;
        }
        
        .percentage-input:focus {
            outline: none;
            border-color: rgba(0, 255, 100, 0.6);
            background: rgba(0, 255, 100, 0.25);
        }
        
        .percentage-symbol {
            color: #00ff64;
            font-size: 1.1rem;
            font-weight: 700;
        }

        .symbol-remove-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            font-weight: normal;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .symbol-remove-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .symbol-grids-container {
            display: flex;
        }
        
        .vertical-separator {
            width: 1px;
            background-color: rgba(255, 255, 255, 0.15);
        }
        
        .price-qty-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            justify-content: start;
            margin-right: 16px;
        }
        
        .paired-controls {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        
        .paired-controls .grid-field:first-child {
            flex: 3;
        }
        
        .paired-controls .grid-field:last-child {
            flex: 0.8;
            min-width: 60px;
        }
        
        .spread-volume-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            justify-content: start;
            margin-left: 16px;
            min-width: 100px;
        }
        
        .grid-field {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        
        .grid-field .detail-label {
            margin-bottom: 4px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .dual-range-container {
            position: relative;
            width: 120px;
            margin: 2px 0;
        }
        
        .dual-range-slider {
            width: 100%;
            height: 20px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            border-radius: 10px;
            outline: none;
            position: absolute;
            top: 0;
            pointer-events: none;
        }
        
        .dual-range-slider::-webkit-slider-track {
            background: rgba(255, 255, 255, 0.1);
            height: 20px;
            border-radius: 10px;
        }
        
        .dual-range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: #00aaff;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: all;
            position: relative;
            z-index: 2;
        }
        
        .dual-range-values {
            position: relative;
            height: 30px;
            margin-top: 15px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
        }
        
        .min-value {
            position: absolute;
            top: 0;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        
        .max-value {
            position: absolute;
            top: 0;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        
        .weight-slider {
            width: 70px;
            height: 20px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
            margin: 2px 0;
        }
        
        .weight-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            background: #00ff64;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .range-display {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-top: 2px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }

        /* Collapsible Card Styles */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            margin-bottom: 6px;
        }

        .card-header:hover {
            background: rgba(255, 255, 255, 0.05);
            margin: -4px -4px 6px -4px;
            padding: 4px;
            border-radius: 4px;
        }

        .collapse-toggle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: bold;
            transition: transform 0.2s ease;
            line-height: 1;
        }

        .card-content {
            overflow: hidden;
            transition: max-height 0.3s ease, opacity 0.2s ease;
        }

        .symbol-card.collapsed .card-content {
            max-height: 0;
            opacity: 0;
        }

        .symbol-card.collapsed .collapse-toggle {
            transform: rotate(-90deg);
        }

        .symbol-card.collapsed {
            padding: 8px 10px;
        }

        .symbol-card.collapsed .card-header {
            margin-bottom: 0;
        }

        .percentage-status {
            font-size: 0.9rem;
            font-weight: 600;
            margin-right: var(--spacing-md);
        }

        .status-complete { color: var(--color-success); }
        .status-remaining { color: var(--text-muted); }
        .status-over { color: var(--color-error); }

        .back-link {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 102;
            color: #6bb6ff;
            font-size: 1.5rem;
            font-weight: 700;
            opacity: 0.8;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .back-link:hover {
            opacity: 1;
            transform: translateX(-3px);
        }

        /* Demo mode banner */
        .demo-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--color-primary);
            color: #ffffff;
            text-align: center;
            padding: 8px 0;
            font-weight: 700;
            font-size: 0.9rem;
            z-index: 1000;
            letter-spacing: 1px;
        }
        
        .w-full { width: 100%; }
        .mb-lg { margin-bottom: var(--spacing-lg); }
        .separator {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, var(--border-primary) 50%, transparent 100%);
            margin: var(--spacing-lg) 0;
        }

        /* Slide-up Input Styles */
        .add-symbol-container {
            position: relative;
            display: inline-block;
        }

        .slide-input {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            margin-bottom: 40px;
            padding: 8px 10px;
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            width: 200px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            z-index: 100;
        }
        
        .slide-input.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: all;
        }
        
        .input-connector {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 32px;
            background: var(--border-primary);
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .input-connector.active {
            opacity: 1;
        }



        .slide-input:focus {
            outline: none;
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.08);
        }

        .slide-input::placeholder {
            color: var(--text-muted);
        }

        .slide-input.error {
            border-color: #ff6b6b;
            animation: shake 0.5s ease-in-out;
        }

        .error-message {
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-bottom: 5px;
            padding: 4px 8px;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 4px;
            color: #ff6b6b;
            font-size: 11px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 101;
            white-space: nowrap;
        }
        
        .error-message.show {
            transform: translateX(-50%) translateY(0);
        }

        .error-message.show {
            opacity: 1;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
            20%, 40%, 60%, 80% { transform: translateX(3px); }
        }
    </style>
</head>
<body>
    <a href="../documentation-hub.html" class="back-link">←</a>
    
    <div class="container">
        <div class="brand" style="text-align: center; margin-bottom: 30px;">
            <h1 style="font-size: 4.5rem; font-weight: 800; letter-spacing: -2px; color: #ffffff; margin-bottom: 8px;">Beacon.</h1>
            <p style="font-size: 1.6rem; font-weight: 400; color: #ffffff; opacity: 0.8; letter-spacing: 0.5px; margin-top: -5px; margin-bottom: 0;">Market Data Generator.</p>
        </div>

        <div class="generator-layout">
            <div class="panel">
                <h2 class="section-title mb-lg">Dataset</h2>
                
                <div class="form-group">
                    <label class="field-label">Total Messages</label>
                    <input type="number" class="form-input" id="totalMessages" value="10000" min="1000" step="1000">
                </div>
                
                <div class="form-group">
                    <label class="field-label">Output Format</label>
                    <select class="form-input" id="outputFormat">
                        <option value="nsdq">NASDAQ (ITCH v5.0)</option>
                        <option value="nyse">NYSE (Pillar v3.2)</option>
                        <option value="cme">CME (MBO v3.0)</option>
                        <option value="csv">CSV File</option>
                    </select>
                </div>
                
                <div class="separator"></div>
                

                
                <div class="form-group">
                    <label class="field-label">Filename</label>
                    <input type="text" id="filenameInput" class="form-input" placeholder="ds-marketdata-20251125.bin" value="ds-marketdata-20251125.bin">
                </div>
                
                <div class="form-group">
                    <button class="btn btn-success w-full" id="generateButton">Generate</button>
                </div>


            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="section-title">Symbols</h2>
                    <div style="display: flex; align-items: center;">
                        <span id="percentageStatus" class="percentage-status status-remaining">100.0% remaining</span>
                        <div class="add-symbol-container">
                            <div class="error-message" id="errorMessage"></div>
                            <input type="text" class="slide-input" id="symbolInput" placeholder="Enter symbol (e.g. AAPL)">
                            <div class="input-connector" id="inputConnector"></div>
                            <button class="btn btn-primary" id="addSymbolBtn" onclick="toggleAddSymbol()">+ Add Symbol</button>
                        </div>
                    </div>
                </div>
                
                <div class="symbols-grid" id="symbolsContainer">
                    <!-- Dynamically generated by module -->
                </div>
            </div>
        </div>
    </div>



    <script type="module">
        import { MarketDataGenerator } from './generator-module.js';
        
        // BRUTAL MODE: Detect demo mode
        const isLocal = window.location.protocol === 'file:' || 
                       window.location.hostname === 'localhost' || 
                       window.location.hostname === '127.0.0.1' ||
                       window.location.hostname === '';
        
        const isDemoMode = !isLocal;
        
        // Add demo banner if in demo mode
        if (isDemoMode) {
            const banner = document.createElement('div');
            banner.className = 'demo-banner';
            banner.textContent = 'DEMO MODE ONLY';
            document.body.insertBefore(banner, document.body.firstChild);
            
            // Adjust page content for banner
            document.body.style.paddingTop = '40px';
        }

        // Initialize and expose globally for onclick handlers
        window.generator = new MarketDataGenerator();
        window.generatorInstance = window.generator; // Also expose as generatorInstance for symbol card handlers
        
        // Add validation function
        function validateGenerate() {
            const filename = document.getElementById('filenameInput').value.trim();
            const generateButton = document.getElementById('generateButton');
            const hasSymbols = generator.state.symbols.size > 0;
            const percentageValid = Math.abs(generator.getRemainingPercentage()) < 0.01;
            const filenameValid = filename.length > 0;
            
            // In demo mode, always disable generate button
            if (isDemoMode) {
                generateButton.disabled = true;
                return;
            }
            
            // Combine all validation requirements
            generateButton.disabled = !(hasSymbols && percentageValid && filenameValid);
        }
        
        window.generator.init();
        
        // Set up callback to re-validate when generator state changes
        window.generator.setUpdateCallback(() => {
            validateGenerate();
        });
        
        // Initial validation to set proper state
        validateGenerate();
        
        // Monitor filename input for validation
        document.getElementById('filenameInput').addEventListener('input', validateGenerate);
        
        // Add click handler for generate button
        document.getElementById('generateButton').addEventListener('click', window.generateDataset);

        // Global functions for HTML onclick handlers
        let inputActive = false;
        
        window.toggleAddSymbol = () => {
            const input = document.getElementById('symbolInput');
            const button = document.getElementById('addSymbolBtn');
            const connector = document.getElementById('inputConnector');
            
            if (!inputActive) {
                input.classList.add('active');
                connector.classList.add('active');
                input.focus();
                input.value = '';
                button.textContent = 'Cancel';
                inputActive = true;
            } else {
                input.classList.remove('active');
                connector.classList.remove('active');
                button.textContent = '+ Add Symbol';
                inputActive = false;
            }
        };

        window.showError = (message) => {
            const input = document.getElementById('symbolInput');
            const errorMsg = document.getElementById('errorMessage');
            
            // Show error styling
            input.classList.add('error');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
        };

        window.clearError = () => {
            const input = document.getElementById('symbolInput');
            const errorMsg = document.getElementById('errorMessage');
            
            input.classList.remove('error');
            errorMsg.classList.remove('show');
        };

        window.confirmAddSymbol = () => {
            const input = document.getElementById('symbolInput');
            const button = document.getElementById('addSymbolBtn');
            const connector = document.getElementById('inputConnector');
            const symbolName = input.value.trim().toUpperCase();
            
            if (symbolName) {
                // Call the generator method that now handles duplicates
                if (generator && generator.addSymbol) {
                    const success = generator.addSymbol(symbolName);
                    if (success === false) {
                        showError('Symbol already added.');
                        return;
                    }
                }
                input.classList.remove('active');
                connector.classList.remove('active');
                button.textContent = '+ Add Symbol';
                inputActive = false;
            }
        };

        // Handle input events
        document.getElementById('symbolInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                confirmAddSymbol();
            } else if (e.key === 'Escape') {
                toggleAddSymbol();
            }
        });
        
        // Clear error when user starts typing
        document.getElementById('symbolInput').addEventListener('input', () => {
            clearError();
        });
        
        // Hide input when clicking outside
        document.addEventListener('click', (e) => {
            const container = e.target.closest('.add-symbol-container');
            if (!container && inputActive) {
                toggleAddSymbol();
            }
        });
        
        window.generateDataset = async () => {
            const filenameInput = document.getElementById('filenameInput');
            const generateButton = document.getElementById('generateButton');
            
            // BRUTAL MODE: Detect if running locally or on web
            const isLocal = window.location.protocol === 'file:' || 
                           window.location.hostname === 'localhost' || 
                           window.location.hostname === '127.0.0.1' ||
                           window.location.hostname === '';
            
            if (!isLocal) {
                // Running on web - show demo message
                alert('Demo Mode: This is a demonstration of the Beacon Generator interface.\n\nTo generate real datasets, download and run Beacon locally.');
                return;
            }
            
            let filename = filenameInput.value.trim();
            if (!filename) {
                // Generate default filename with date
                const now = new Date();
                const year = now.getFullYear();
                const month = String(now.getMonth() + 1).padStart(2, '0');
                const day = String(now.getDate()).padStart(2, '0');
                filename = `ds-marketdata-${year}${month}${day}`;
                
                // If that might be taken, add time
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const seconds = String(now.getSeconds()).padStart(2, '0');
                filename = `ds-marketdata-${year}${month}${day}-${hours}${minutes}${seconds}`;
            }
            
            // Get file extension based on output format
            const outputFormat = document.getElementById('outputFormat').value;
            let extension;
            switch(outputFormat) {
                case 'cme': extension = '.cme'; break;
                case 'nyse': extension = '.nyse'; break;
                case 'nsdq': extension = '.nsdq'; break;
                case 'csv': extension = '.csv'; break;
                default: extension = '.dat'; break;
            }
            
            // Add extension if not present
            if (!filename.toLowerCase().endsWith(extension)) {
                filename += extension;
            }
            
            // Disable controls during generation
            generateButton.disabled = true;
            filenameInput.disabled = true;
            generateButton.textContent = 'Generating...';
            
            try {
                // Simulate generation process
                const config = generator.exportConfiguration();
                
                // Create dataset content (placeholder for now)
                const datasetContent = `# Generated Dataset\n# Format: ${outputFormat}\n# Timestamp: ${new Date().toISOString()}\n# Configuration: ${JSON.stringify(config, null, 2)}`;
                
                const blob = new Blob([datasetContent], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
                
                alert(`Dataset generated: ${filename}\nNote: Move to /usr/datasets/ directory`);
                
            } catch (error) {
                alert(`Generation failed: ${error.message}`);
            } finally {
                // Re-enable controls
                generateButton.textContent = 'Generate';
                filenameInput.disabled = false;
                validateGenerate(); // Re-validate to set proper disabled state
            }
        };
    </script>
</body>
</html>
