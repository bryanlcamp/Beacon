<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Market Data Generator</title>
    <link rel="stylesheet" href="../css/beacon-ui.css">

</head>
<body>
    <a href="../docs/documentation-hub.html" class="back-link">←</a>
    
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Beacon.</h1>
            <p class="page-subtitle">Market Data Generator.</p>
        </div>

        <div class="generator-layout">
            <div class="panel">
                <h2 class="section-title mb-lg">Configuration</h2>
                
                <div class="form-group">
                    <label class="field-label">Total Messages</label>
                    <input type="number" class="input" id="totalMessages" value="10000" min="1000" step="1000">
                </div>
                
                <div class="form-group">
                    <label class="field-label">Output Format</label>
                    <select class="input" id="outputFormat">
                        <option value="nsdq">NASDAQ (ITCH v5.0)</option>
                        <option value="nyse">NYSE (Pillar v3.2)</option>
                        <option value="cme">CME (MBO v3.0)</option>
                        <option value="csv">CSV File</option>
                    </select>
                </div>
                
                <div class="separator"></div>
                
                <div class="form-group">
                    <label class="field-label">Dataset Filename</label>
                    <input type="text" id="filenameInput" class="input" placeholder="dataset-marketdata-20251125" value="dataset-marketdata-20251125">
                </div>
                
                <div class="form-group">
                    <button class="btn btn-success w-full" id="generateButton">Generate</button>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <h2 class="section-title">Symbols</h2>
                    <div style="display: flex; align-items: center;">
                        <span id="percentageStatus" class="percentage-status status-remaining">100.0% remaining</span>
                        <div class="add-symbol-container">
                            <div class="error-message" id="errorMessage"></div>
                            <input type="text" class="slide-input" id="symbolInput" placeholder="Enter symbol (e.g. AAPL)">
                            <div class="input-connector" id="inputConnector"></div>
                            <button class="btn btn-primary" id="addSymbolBtn">+ Add Symbol</button>
                        </div>
                    </div>
                </div>
                
                <div class="symbols-grid" id="symbolsContainer">
                    <!-- Dynamically generated by our new architecture -->
                </div>
            </div>
        </div>
    </div>
    
    <script type="importmap">
    {
        "imports": {
            "config/constants.js": "./config/constants.js",
            "utils/dom.js": "./utils/dom.js", 
            "utils/errors.js": "./utils/errors.js",
            "utils/validation.js": "./utils/validation.js",
            "components/EditBox.js": "./components/EditBox.js",
            "components/Button.js": "./components/Button.js", 
            "components/NotificationSystem.js": "./components/NotificationSystem.js",
            "services/BackendService.js": "./services/BackendService.js",
            "generator/GeneratorState.js": "./generator/GeneratorState.js",
            "generator/Generator.js": "./generator/Generator.js"
        }
    }
    </script>
    
    <script type="module">
        import { MarketDataGenerator } from 'generator/Generator.js';
        
        let generator;
        let inputActive = false;
        
        // Initialize generator when DOM is ready
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                generator = new MarketDataGenerator();
                await generator.initExternal(document.getElementById('symbolsContainer'));
                
                // Set up add symbol functionality
                setupAddSymbolInterface();
                
                // Set up generate button
                setupGenerateButton();
                
                console.log('Generator initialized successfully');
                
            } catch (error) {
                console.error('Failed to initialize generator:', error);
                const container = document.getElementById('symbolsContainer');
                if (container) {
                    container.innerHTML = `
                        <div style="color: var(--color-error); text-align: center; padding: var(--space-xl);">
                            <h3>Initialization Error</h3>
                            <p>${error.message}</p>
                        </div>
                    `;
                }
            }
        });
        
        function setupAddSymbolInterface() {
            const addBtn = document.getElementById('addSymbolBtn');
            const symbolInput = document.getElementById('symbolInput');
            
            addBtn.addEventListener('click', toggleAddSymbol);
            symbolInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    confirmAddSymbol();
                } else if (e.key === 'Escape') {
                    toggleAddSymbol();
                }
            });
            
            // Hide input when clicking outside
            document.addEventListener('click', (e) => {
                const container = e.target.closest('.add-symbol-container');
                if (!container && inputActive) {
                    toggleAddSymbol();
                }
            });
        }
        
        function toggleAddSymbol() {
            const input = document.getElementById('symbolInput');
            const button = document.getElementById('addSymbolBtn');
            const connector = document.getElementById('inputConnector');
            
            if (!inputActive) {
                input.classList.add('active');
                connector.classList.add('active');
                input.focus();
                input.value = '';
                button.textContent = 'Cancel';
                inputActive = true;
            } else {
                input.classList.remove('active');
                connector.classList.remove('active');
                button.textContent = '+ Add Symbol';
                inputActive = false;
            }
        }
        
        function confirmAddSymbol() {
            const input = document.getElementById('symbolInput');
            const button = document.getElementById('addSymbolBtn');
            const connector = document.getElementById('inputConnector');
            const symbolName = input.value.trim().toUpperCase();
            
            if (symbolName && generator) {
                const success = generator.addSymbol(symbolName);
                if (success) {
                    input.classList.remove('active');
                    connector.classList.remove('active');
                    button.textContent = '+ Add Symbol';
                    inputActive = false;
                } else {
                    showError(`Failed to add ${symbolName}`);
                }
            }
        }
        
        function showError(message) {
            const input = document.getElementById('symbolInput');
            const errorMsg = document.getElementById('errorMessage');
            
            input.classList.add('error');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            
            setTimeout(() => {
                input.classList.remove('error');
                errorMsg.classList.remove('show');
            }, 3000);
        }
        
        // All symbol management is now handled by the Generator class
        
        function setupGenerateButton() {
            const generateBtn = document.getElementById('generateButton');
            generateBtn.addEventListener('click', async () => {
                if (!generator) return;
                
                const config = generator.state.exportConfig();
                const filename = document.getElementById('filenameInput').value.trim() || 'dataset';
                
                // Create mock dataset file
                const content = JSON.stringify(config, null, 2);
                const blob = new Blob([content], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${filename}.json`;
                a.click();
                URL.revokeObjectURL(url);
            });
        }
        
        // Expose generator globally 
        window.generator = generator;
    </script>
</body>
</html>
