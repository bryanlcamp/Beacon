<!-- Data Cards Component -->
<!-- This component handles the main content area where datacards are displayed -->

<div class="data-cards-container" style="flex: 1; padding: 2em 2em 2em 0; position: relative; min-height: 400px;">
    <!-- Products container -->
    <div class="products-wrapper" style="position: relative; min-height: 300px; display: flex; align-items: center; justify-content: center;">
        <!-- Products will be added here dynamically -->
        <div id="datacardContainer" style="width: 100%; height: 100%;"></div>

        <!-- Empty state message -->
        <div id="emptyProductsMessage" style="position: absolute; text-align: center; color: rgba(255, 255, 255, 0.5); font-style: italic;">
            No products added yet. Use the "Add Product" section to get started.
        </div>
    </div>
</div>
