<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon - Algorithm Testing</title>
    <style>
        /* Your golden GitHub Pages styles */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a15;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            padding: 60px;
        }
        
        /* Your gorgeous geometric light rays */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(135deg, rgba(255, 255, 255, 0.18) 0%, rgba(255, 255, 255, 0.12) 30%, rgba(255, 255, 255, 0.06) 60%, transparent 100%),
                linear-gradient(140deg, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0.08) 25%, rgba(255, 255, 255, 0.03) 50%, transparent 75%),
                linear-gradient(130deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.06) 25%, rgba(255, 255, 255, 0.02) 50%, transparent 75%);
            z-index: 1;
            pointer-events: none;
        }
        
        .nav-links {
            position: fixed;
            top: 30px;
            right: 60px;
            z-index: 102;
        }
        
        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: opacity 0.3s ease;
        }
        
        .nav-links a:hover { opacity: 1; }
        
        .main-content {
            position: relative;
            z-index: 2;
            margin-bottom: 80px;
        }
        
        .brand { margin-bottom: 40px; }
        
        .brand h1 {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -3px;
            color: #ffffff;
            margin-bottom: 12px;
        }
        
        .tagline {
            font-size: 1.6rem;
            font-weight: 400;
            color: #ffffff;
            opacity: 0.8;
            letter-spacing: 0.5px;
            text-align: right;
        }
        
        .cta-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 15px;
            padding: 0;
            background: none;
            text-decoration: none;
            border: none;
            border-radius: 0;
            transition: all 0.3s ease;
            margin: 0;
        }
        
        .cta-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .cta-arrow {
            color: #6bb6ff;
            font-size: 1.5rem;
            font-weight: 700;
            opacity: 0.8;
            transition: transform 0.3s ease;
        }
        
        .cta-button:hover .cta-arrow {
            transform: translateX(3px);
        }
        
        .cta-button:hover .cta-text {
            color: #ffffff;
        }
        
        @media (max-width: 768px) {
            body { padding: 40px 30px; }
            .nav-links { top: 20px; right: 30px; }
            .nav-links a { font-size: 0.8rem; }
            .brand h1 { font-size: 4rem; letter-spacing: -2px; }
            .tagline { font-size: 1.3rem; }
            .cta-section { flex-direction: column; align-items: flex-start; gap: 15px; }
            .cta-text { font-size: 1rem; }
            .cta-arrow { font-size: 1.3rem; }
        }
        
        @media (max-width: 480px) {
            .brand h1 { font-size: 3rem; letter-spacing: -1px; }
            .tagline { font-size: 1.1rem; }
            .cta-text { font-size: 0.9rem; }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation matching your GitHub Pages -->
    <nav class="nav-links">
        <a href="https://github.com/bryanlcamp">Contact</a>
    </nav>

    <!-- Main content exactly like your golden GitHub Pages -->
    <div class="main-content">
        <div class="brand">
            <h1>Beacon.</h1>
            <p class="tagline">Live Trading Simulation. HFT Performance.</p>
        </div>
        
        <div class="cta-section">
            <a href="web/command-center/" class="cta-button">
                <span class="cta-text">See it in Action.</span>
                <span class="cta-arrow">→</span>
            </a>
        </div>
    </div>
</body>
</html>
