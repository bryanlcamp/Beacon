<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon - Synchronized Playback Configuration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a15 0%, #0d1020 25%, #060d28 50%, #0d1020 75%, #0a0a15 100%);
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .back-button {
            position: fixed;
            top: 25px;
            left: 40px;
            z-index: 102;
        }
        
        .back-button a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            transition: all 0.3s ease;
            border-radius: 6px;
        }
        
        .back-button a:hover {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.1);
        }
        
        .sync-status {
            position: fixed;
            top: 25px;
            right: 40px;
            z-index: 102;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .sync-status.connected {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }
        
        .sync-status.disconnected {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }
        
        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 40px;
            font-weight: 600;
        }
        
        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 20px;
            align-items: start;
        }
        
        .config-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .panel-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: #ffffff;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.9rem;
        }
        
        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.9rem;
        }
        
        .form-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }
        
        .form-select {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #ffffff;
            font-size: 0.9rem;
        }
        
        .form-select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .form-row .form-group {
            margin-bottom: 0;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.25);
        }
        
        .btn-success {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }
        
        .btn-success:hover:not(:disabled) {
            background: rgba(0, 255, 100, 0.3);
        }
        
        .btn-info {
            background: rgba(100, 150, 255, 0.2);
            color: #64a0ff;
            border: 1px solid rgba(100, 150, 255, 0.4);
        }
        
        .btn-info:hover:not(:disabled) {
            background: rgba(100, 150, 255, 0.3);
        }
        
        .notification {
            position: fixed;
            top: 80px;
            right: 40px;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 103;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }
        
        .notification.error {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }
        
        @media (max-width: 768px) {
            .config-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Back button -->
    <div class="back-button">
        <a href="../documentation-hub.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="15,18 9,12 15,6"></polyline>
            </svg>
        </a>
    </div>

    <!-- Sync status indicator -->
    <div class="sync-status" id="syncStatus">
        <div class="sync-indicator"></div>
        <span id="syncText">Connecting...</span>
    </div>

    <!-- Notification area -->
    <div class="notification" id="notification"></div>

    <div class="container">
        <h1>Playback Engine.</h1>
        <p class="subtitle">Synchronized configuration with C++ application</p>

        <div class="config-grid">
            <!-- Network Configuration -->
            <div class="config-panel">
                <h2 class="panel-title">Network Configuration</h2>
                
                <div class="form-group">
                    <label class="form-label">Protocol</label>
                    <select class="form-select" id="protocol" onchange="saveConfig()">
                        <option value="udp">UDP</option>
                        <option value="tcp">TCP</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Host</label>
                        <input type="text" class="form-input" id="host" onchange="saveConfig()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Port</label>
                        <input type="number" class="form-input" id="port" onchange="saveConfig()">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Multicast Address</label>
                        <input type="text" class="form-input" id="multicastAddress" onchange="saveConfig()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Multicast TTL</label>
                        <input type="number" class="form-input" id="multicastTtl" onchange="saveConfig()">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Socket Buffer Size</label>
                    <input type="number" class="form-input" id="socketBufferSize" onchange="saveConfig()">
                </div>
            </div>

            <!-- Playback Settings -->
            <div class="config-panel">
                <h2 class="panel-title">Playback Settings</h2>
                
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="loopMode" onchange="saveConfig()">
                        <label class="form-label" for="loopMode">Loop Mode</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="realTime" onchange="saveConfig()">
                        <label class="form-label" for="realTime">Real Time Playback</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Speed Multiplier</label>
                        <input type="number" class="form-input" step="0.1" id="speedMultiplier" onchange="saveConfig()">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Batch Size</label>
                        <input type="number" class="form-input" id="batchSize" onchange="saveConfig()">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Message Delay (μs)</label>
                    <input type="number" class="form-input" id="messageDelay" onchange="saveConfig()">
                </div>
            </div>

            <!-- Authorities Configuration -->
            <div class="config-panel">
                <h2 class="panel-title">Authorities</h2>
                
                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="authoritiesEnabled" onchange="saveConfig()">
                        <label class="form-label" for="authoritiesEnabled">Enable Authorities</label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="form-label">Default Authority</label>
                    <select class="form-select" id="defaultAuthority" onchange="saveConfig()">
                        <option value="continuous">Continuous</option>
                        <option value="burst">Burst</option>
                        <option value="chaos">Chaos</option>
                        <option value="wave">Wave</option>
                        <option value="null">Null</option>
                    </select>
                </div>
            </div>

            <!-- Senders Configuration -->
            <div class="config-panel">
                <h2 class="panel-title">Senders</h2>
                
                <div class="form-group">
                    <label class="form-label">Default Sender</label>
                    <select class="form-select" id="defaultSender" onchange="saveConfig()">
                        <option value="udp_loopback">UDP Loopback</option>
                        <option value="tcp_loopback">TCP Loopback</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-info" onclick="loadConfig()" id="loadBtn">Reload from File</button>
            <button class="btn btn-primary" onclick="resetToDefaults()" id="resetBtn">Reset to Defaults</button>
            <button class="btn btn-success" onclick="manualSave()" id="saveBtn">Save Now</button>
        </div>
    </div>

    <script>
        // Configuration management
        const API_BASE = 'http://localhost:5001/api';
        const CONFIG_NAME = 'Playbook';
        let isConnected = false;
        let lastTimestamp = 0;
        let saveTimeout = null;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            checkConnection();
            loadConfig();
            
            // Poll for external changes every 2 seconds
            setInterval(checkForUpdates, 2000);
        });
        
        async function checkConnection() {
            try {
                const response = await fetch(`${API_BASE}/configs`);
                if (response.ok) {
                    setConnectionStatus(true);
                } else {
                    setConnectionStatus(false);
                }
            } catch (error) {
                setConnectionStatus(false);
            }
        }
        
        function setConnectionStatus(connected) {
            isConnected = connected;
            const statusElement = document.getElementById('syncStatus');
            const textElement = document.getElementById('syncText');
            
            if (connected) {
                statusElement.className = 'sync-status connected';
                textElement.textContent = 'Synchronized';
            } else {
                statusElement.className = 'sync-status disconnected';
                textElement.textContent = 'Disconnected';
            }
            
            // Enable/disable buttons based on connection
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.disabled = !connected;
            });
        }
        
        async function loadConfig() {
            if (!isConnected) {
                showNotification('Cannot load - server disconnected', 'error');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/config/${CONFIG_NAME}`);
                if (response.ok) {
                    const config = await response.json();
                    
                    if (config.error) {
                        showNotification(config.error, 'error');
                        loadDefaults();
                        return;
                    }
                    
                    populateForm(config);
                    showNotification('Configuration loaded', 'success');
                    
                    // Update timestamp
                    const timestampResponse = await fetch(`${API_BASE}/config/${CONFIG_NAME}/timestamp`);
                    if (timestampResponse.ok) {
                        const timestampData = await timestampResponse.json();
                        lastTimestamp = timestampData.timestamp;
                    }
                } else {
                    throw new Error('Failed to load configuration');
                }
            } catch (error) {
                showNotification('Failed to load configuration: ' + error.message, 'error');
                loadDefaults();
            }
        }
        
        async function saveConfig() {
            if (!isConnected) return;
            
            // Debounce saves - wait 500ms after last change
            if (saveTimeout) {
                clearTimeout(saveTimeout);
            }
            
            saveTimeout = setTimeout(async () => {
                try {
                    const config = collectFormData();
                    const response = await fetch(`${API_BASE}/config/${CONFIG_NAME}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(config)
                    });
                    
                    if (response.ok) {
                        const result = await response.json();
                        if (result.error) {
                            showNotification(result.error, 'error');
                        } else {
                            // Update timestamp
                            const timestampResponse = await fetch(`${API_BASE}/config/${CONFIG_NAME}/timestamp`);
                            if (timestampResponse.ok) {
                                const timestampData = await timestampResponse.json();
                                lastTimestamp = timestampData.timestamp;
                            }
                        }
                    } else {
                        throw new Error('Save failed');
                    }
                } catch (error) {
                    showNotification('Auto-save failed: ' + error.message, 'error');
                }
            }, 500);
        }
        
        async function manualSave() {
            if (!isConnected) {
                showNotification('Cannot save - server disconnected', 'error');
                return;
            }
            
            try {
                const config = collectFormData();
                const response = await fetch(`${API_BASE}/config/${CONFIG_NAME}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.error) {
                        showNotification(result.error, 'error');
                    } else {
                        showNotification('Configuration saved successfully', 'success');
                        
                        // Update timestamp
                        const timestampResponse = await fetch(`${API_BASE}/config/${CONFIG_NAME}/timestamp`);
                        if (timestampResponse.ok) {
                            const timestampData = await timestampResponse.json();
                            lastTimestamp = timestampData.timestamp;
                        }
                    }
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                showNotification('Save failed: ' + error.message, 'error');
            }
        }
        
        async function checkForUpdates() {
            if (!isConnected) return;
            
            try {
                const response = await fetch(`${API_BASE}/config/${CONFIG_NAME}/timestamp`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.timestamp > lastTimestamp) {
                        // File was modified externally, reload
                        lastTimestamp = data.timestamp;
                        const configResponse = await fetch(`${API_BASE}/config/${CONFIG_NAME}`);
                        if (configResponse.ok) {
                            const config = await configResponse.json();
                            if (!config.error) {
                                populateForm(config);
                                showNotification('Configuration updated from file', 'success');
                            }
                        }
                    }
                }
            } catch (error) {
                // Ignore polling errors
            }
        }
        
        function populateForm(config) {
            // Network configuration
            if (config.network?.output) {
                const network = config.network.output;
                document.getElementById('protocol').value = network.protocol || 'udp';
                document.getElementById('host').value = network.host || '127.0.0.1';
                document.getElementById('port').value = network.port || 12345;
                document.getElementById('multicastAddress').value = network.multicast_address || '239.255.0.1';
                document.getElementById('multicastTtl').value = network.multicast_ttl || 1;
                document.getElementById('socketBufferSize').value = network.socket_buffer_size || 65536;
            }
            
            // Playback configuration
            if (config.playback) {
                const playback = config.playback;
                document.getElementById('loopMode').checked = playback.loop_mode || false;
                document.getElementById('realTime').checked = playback.real_time !== false;
                document.getElementById('speedMultiplier').value = playback.speed_multiplier || 1.0;
                document.getElementById('batchSize').value = playback.batch_size || 100;
                document.getElementById('messageDelay').value = playback.message_delay_us || 1000;
            }
            
            // Authorities configuration
            if (config.authorities) {
                const authorities = config.authorities;
                document.getElementById('authoritiesEnabled').checked = authorities.enabled !== false;
                document.getElementById('defaultAuthority').value = authorities.default_authority || 'continuous';
            }
            
            // Senders configuration
            if (config.senders) {
                document.getElementById('defaultSender').value = config.senders.default_sender || 'udp_loopback';
            }
        }
        
        function collectFormData() {
            return {
                application: {
                    name: "Beacon Playback Engine",
                    version: "1.0.0",
                    description: "Market data playback engine with configurable transmission modes",
                    architecture: "playbook -> playback (UDP) -> market_data_receiver"
                },
                network: {
                    output: {
                        protocol: document.getElementById('protocol').value,
                        host: document.getElementById('host').value,
                        port: parseInt(document.getElementById('port').value) || 12345,
                        multicast_address: document.getElementById('multicastAddress').value,
                        multicast_ttl: parseInt(document.getElementById('multicastTtl').value) || 1,
                        socket_buffer_size: parseInt(document.getElementById('socketBufferSize').value) || 65536
                    }
                },
                playback: {
                    loop_mode: document.getElementById('loopMode').checked,
                    real_time: document.getElementById('realTime').checked,
                    speed_multiplier: parseFloat(document.getElementById('speedMultiplier').value) || 1.0,
                    batch_size: parseInt(document.getElementById('batchSize').value) || 100,
                    message_delay_us: parseInt(document.getElementById('messageDelay').value) || 1000
                },
                authorities: {
                    enabled: document.getElementById('authoritiesEnabled').checked,
                    default_authority: document.getElementById('defaultAuthority').value,
                    authority_configs: [
                        "authorities/authority_burst.json",
                        "authorities/authority_chaos.json",
                        "authorities/authority_continuous.json",
                        "authorities/authority_null.json",
                        "authorities/authority_wave.json"
                    ]
                },
                senders: {
                    default_sender: document.getElementById('defaultSender').value,
                    sender_configs: [
                        "senders/sender_udp_loopback.json",
                        "senders/sender_tcp_loopback.json"
                    ]
                }
            };
        }
        
        function loadDefaults() {
            // Network defaults
            document.getElementById('protocol').value = 'udp';
            document.getElementById('host').value = '127.0.0.1';
            document.getElementById('port').value = '12345';
            document.getElementById('multicastAddress').value = '239.255.0.1';
            document.getElementById('multicastTtl').value = '1';
            document.getElementById('socketBufferSize').value = '65536';
            
            // Playback defaults
            document.getElementById('loopMode').checked = false;
            document.getElementById('realTime').checked = true;
            document.getElementById('speedMultiplier').value = '1.0';
            document.getElementById('batchSize').value = '100';
            document.getElementById('messageDelay').value = '1000';
            
            // Authorities defaults
            document.getElementById('authoritiesEnabled').checked = true;
            document.getElementById('defaultAuthority').value = 'continuous';
            
            // Senders defaults
            document.getElementById('defaultSender').value = 'udp_loopback';
        }
        
        function resetToDefaults() {
            loadDefaults();
            saveConfig();
            showNotification('Configuration reset to defaults', 'success');
        }
        
        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }
        
        // Check connection status periodically
        setInterval(checkConnection, 5000);
    </script>
</body>
</html>
