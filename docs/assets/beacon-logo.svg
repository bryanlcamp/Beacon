<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="40" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beaconGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="120" height="40" rx="4" fill="url(#beaconGradient)"/>
  
  <!-- Capital B with light rays -->
  <g transform="translate(8, 8)">
    <!-- Light rays emanating from B -->
    <line x1="12" y1="4" x2="21" y2="2" stroke="#999999" stroke-width="1.5" opacity="0.7"/>
    <line x1="12" y1="8" x2="23" y2="6" stroke="#999999" stroke-width="1" opacity="0.8"/>
    <line x1="12" y1="12" x2="25" y2="12" stroke="#aaaaaa" stroke-width="2" opacity="0.9"/>
    <line x1="12" y1="16" x2="23" y2="18" stroke="#999999" stroke-width="1" opacity="0.8"/>
    <line x1="12" y1="20" x2="21" y2="22" stroke="#999999" stroke-width="1.5" opacity="0.7"/>
    
    <!-- Modern Recognizable B -->
    <path d="M 4,4 L 4,20 M 4,4 L 10,4 Q 12,4 12,7 Q 12,9 10,9 L 4,9 M 4,12 L 10,12 Q 12,12 12,15 Q 12,18 10,18 L 4,18" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="1.8" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>
  </g>
  
  <!-- BEACON Text -->
  <text x="38" y="26" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">BEACON</text>
</svg>