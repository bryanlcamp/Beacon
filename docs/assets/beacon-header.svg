<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="200" height="60" rx="6" fill="url(#headerGradient)"/>
  
  <!-- Capital B Icon with light rays -->
  <g transform="translate(15, 15)">
    <!-- Light rays emanating from B -->
    <line x1="15" y1="8" x2="26" y2="5" stroke="#999999" stroke-width="1.5" opacity="0.7"/>
    <line x1="15" y1="12" x2="29" y2="12" stroke="#aaaaaa" stroke-width="2" opacity="0.8"/>
    <line x1="15" y1="16" x2="26" y2="19" stroke="#999999" stroke-width="1.5" opacity="0.7"/>
    <line x1="15" y1="4" x2="23" y2="2" stroke="#999999" stroke-width="1" opacity="0.6"/>
    <line x1="15" y1="20" x2="23" y2="22" stroke="#999999" stroke-width="1" opacity="0.6"/>
    
    <!-- Modern Recognizable B -->
    <path d="M 7,7 L 7,23 M 7,7 L 15,7 Q 17,7 17,10 Q 17,12 15,12 L 7,12 M 7,15 L 15,15 Q 17,15 17,18 Q 17,21 15,21 L 7,21" 
          fill="none" 
          stroke="#ffffff" 
          stroke-width="1.8" 
          stroke-linejoin="round" 
          stroke-linecap="round"/>
  </g>
  
  <!-- BEACON Text -->
  <text x="55" y="25" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">BEACON</text>
  
  <!-- Tagline -->
  <text x="55" y="42" font-family="Arial, sans-serif" font-size="10" fill="#aaaaaa" opacity="0.8">TRADING SYSTEM</text>
</svg>