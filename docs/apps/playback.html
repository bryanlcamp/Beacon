<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Data Playback</title>
    <style>
        /* CSS Custom Properties */
        :root {
            --bg-primary: linear-gradient(135deg, #0a0a15 0%, #0d1020 25%, #060d28 50%, #0d1020 75%, #0a0a15 100%);
            --bg-panel: rgba(255, 255, 255, 0.05);
            --bg-card: rgba(255, 255, 255, 0.03);
            --border-primary: rgba(255, 255, 255, 0.1);
            --border-focus: rgba(0, 170, 255, 0.5);
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.6);
            
            --color-success: #00ff64;
            --color-primary: #00aaff;
            --color-warning: #ffaa00;
            --color-error: #ff4444;
            
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 12px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        .title-main {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px;
        }

        .panel {
            background: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            border: 1px solid var(--border-primary);
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
            color: var(--text-primary);
        }

        .field-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .form-input {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--border-focus);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn {
            padding: 8px var(--spacing-md);
            border: 1px solid;
            border-radius: var(--radius-sm);
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: var(--spacing-xs);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: rgba(0, 170, 255, 0.15);
            color: var(--color-primary);
            border-color: rgba(0, 170, 255, 0.3);
        }

        .btn-success {
            background: rgba(0, 255, 100, 0.15);
            color: var(--color-success);
            border-color: rgba(0, 255, 100, 0.3);
        }

        .btn-secondary {
            background: rgba(100, 150, 255, 0.15);
            color: rgba(100, 150, 255, 0.9);
            border-color: rgba(100, 150, 255, 0.3);
        }

        .file-selection {
            margin-bottom: 20px;
        }

        .file-input-group {
            display: flex;
            gap: 8px;
        }

        .file-input-group select {
            flex: 1;
        }

        .data-source-display {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 20px;
        }

        .source-text {
            font-weight: 600;
            color: var(--text-primary);
        }

        .source-details {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .playback-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .speed-control {
            display: flex;
            flex-direction: column;
        }

        .speed-slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .speed-slider {
            flex: 1;
            height: 20px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            outline: none;
        }

        .speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #00aaff;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .speed-display {
            font-size: 0.9rem;
            font-weight: 600;
            color: #00aaff;
            min-width: 40px;
            text-align: center;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .checkbox-container input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }

        .transport-controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 16px 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00aaff, #00ff64);
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-info {
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title-main">Data Playback</h1>
        <p class="subtitle">Play Generated Market Data Files</p>

        <div class="panel">
            <h2 class="section-title">File Selection</h2>
            
            <!-- File selector will be injected here -->
            <div id="playbackFileContainer"></div>
            
            <div class="data-source-display" id="dataSourceDisplay">
                <span class="source-text">Select a file to begin</span>
                <span class="source-details" id="sourceDetails"></span>
            </div>
        </div>

        <div class="panel">
            <h2 class="section-title">Playback Controls</h2>
            
            <div class="playback-controls">
                <div class="speed-control">
                    <label class="field-label">Playback Speed</label>
                    <div class="speed-slider-container">
                        <input type="range" id="playbackSpeed" class="speed-slider" min="1" max="100" value="1" step="1">
                        <div class="speed-display"><span id="speedValue">1</span>x</div>
                    </div>
                </div>
                
                <div class="playback-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="loopMode">
                        <span>Continuous Loop</span>
                    </label>
                </div>
            </div>
            
            <div class="transport-controls">
                <button class="btn btn-success" id="playBtn" onclick="playbackInstance.play()" disabled>▶ Play</button>
                <button class="btn btn-secondary" id="pauseBtn" onclick="playbackInstance.pause()" disabled>⏸ Pause</button>
                <button class="btn btn-secondary" id="stopBtn" onclick="playbackInstance.stop()" disabled>⏹ Stop</button>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-info">
                <span id="progressText">Ready</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { PlaybackWithFileSelector } from './playback-module.js';
        
        // Initialize playback with file selector
        window.playbackInstance = new PlaybackWithFileSelector();
        window.playbackInstance.init();
    </script>
</body>
</html>
