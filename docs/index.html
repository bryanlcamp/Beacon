<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon - Your Personal Guide from Idea to Market</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: hsl(220, 45%, 8%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            text-align: center;
            max-width: 1000px;
            padding: 0 40px;
        }
        
        .github-icon {
            position: fixed;
            top: 25px;
            right: 40px;
            z-index: 101;
            color: #ffffff;
            font-size: 1.8rem;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s ease;
        }
        
        .github-icon:hover {
            opacity: 1;
        }
        
        .nav-links {
            position: fixed;
            top: 70px;
            right: 40px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: opacity 0.3s ease;
            text-align: right;
        }
        
        .nav-links a:hover {
            opacity: 0.7;
        }
        
        .brand {
            margin-bottom: 24px;
        }
        
        .brand h1 {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 8px;
            transition: opacity 0.3s ease;
        }
        
        .brand a:hover h1 {
            opacity: 0.8;
        }
        
        .tagline {
            font-size: 1.4rem;
            font-weight: 300;
            opacity: 0.85;
            letter-spacing: 1px;
        }
        
        /* Space reserved for HFT performance indicators */
        .hft-indicators {
            margin-top: 40px;
            /* Future: subtle performance metrics */
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 0 20px;
            }
            
            .github-icon {
                top: 15px;
                right: 20px;
                font-size: 1.5rem;
            }
            
            .nav-links {
                top: 55px;
                right: 20px;
                gap: 15px;
            }
            
            .nav-links a {
                font-size: 0.8rem;
            }
            
            .brand h1 {
                font-size: 3rem;
                letter-spacing: -1px;
            }
            
            .tagline {
                font-size: 1.1rem;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- GitHub Icon -->
    <a href="https://github.com/bryanlcamp/Beacon" class="github-icon">🐈‍⬛</a>
    
    <!-- Navigation Links -->
    <nav class="nav-links">
        <a href="docs.html">Let's Get Started!</a>
        <a href="https://github.com/bryanlcamp">Contact</a>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="brand">
            <a href="docs.html" style="color: inherit; text-decoration: none;">
                <h1>Beacon.</h1>
            </a>
            <p class="tagline">Your Personal Guide. From Idea to Market.</p>
        </div>
    </div>
</body>
</html>
