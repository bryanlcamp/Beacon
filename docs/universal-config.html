<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beacon Universal Configuration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a15 0%, #0d1020 25%, #060d28 50%, #0d1020 75%, #0a0a15 100%);
            color: #ffffff;
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 21, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px 0;
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .config-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
        }
        
        .sync-status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .sync-status.connected {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }
        
        .sync-status.disconnected {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }
        
        .sync-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .config-selector {
            margin-bottom: 30px;
            text-align: center;
        }
        
        .config-select {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            min-width: 300px;
        }
        
        .config-select option {
            background: #1a1a2e;
            color: #ffffff;
        }
        
        .config-editor {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 30px;
            align-items: start;
        }
        
        .json-editor {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .editor-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #ffffff;
        }
        
        .json-textarea {
            width: 100%;
            height: 500px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            padding: 20px;
            resize: vertical;
            line-height: 1.5;
        }
        
        .json-textarea:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(0, 0, 0, 0.4);
        }
        
        .controls-panel {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            height: fit-content;
        }
        
        .control-group {
            margin-bottom: 25px;
        }
        
        .control-label {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffffff;
            display: block;
        }
        
        .btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-primary {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        .btn-primary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.25);
        }
        
        .btn-success {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }
        
        .btn-success:hover:not(:disabled) {
            background: rgba(0, 255, 100, 0.3);
        }
        
        .btn-warning {
            background: rgba(255, 200, 0, 0.2);
            color: #ffc800;
            border: 1px solid rgba(255, 200, 0, 0.4);
        }
        
        .btn-warning:hover:not(:disabled) {
            background: rgba(255, 200, 0, 0.3);
        }
        
        .btn-danger {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }
        
        .btn-danger:hover:not(:disabled) {
            background: rgba(255, 100, 100, 0.3);
        }
        
        .status-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        
        .status-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .status-row:last-child {
            margin-bottom: 0;
        }
        
        .status-label {
            opacity: 0.7;
        }
        
        .status-value {
            font-weight: 600;
        }
        
        .notification {
            position: fixed;
            top: 80px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 200;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            max-width: 350px;
        }
        
        .notification.show {
            transform: translateX(0);
        }
        
        .notification.success {
            background: rgba(0, 255, 100, 0.2);
            color: #00ff64;
            border: 1px solid rgba(0, 255, 100, 0.4);
        }
        
        .notification.error {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6464;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }
        
        .notification.info {
            background: rgba(100, 150, 255, 0.2);
            color: #64a0ff;
            border: 1px solid rgba(100, 150, 255, 0.4);
        }
        
        @media (max-width: 1024px) {
            .config-editor {
                grid-template-columns: 1fr;
            }
            
            .controls-panel {
                order: -1;
            }
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <div class="config-title" id="configTitle">Universal Configuration</div>
            <div class="sync-status" id="syncStatus">
                <div class="sync-indicator"></div>
                <span id="syncText">Connecting...</span>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <div class="container">
        <div class="config-selector">
            <select class="config-select" id="configSelect" onchange="loadSelectedConfig()">
                <option value="">Select a configuration file...</option>
            </select>
        </div>

        <div class="config-editor" id="configEditor" style="display: none;">
            <div class="json-editor">
                <div class="editor-title">JSON Configuration</div>
                <textarea 
                    class="json-textarea" 
                    id="jsonEditor" 
                    placeholder="Select a configuration file to begin editing..."
                    oninput="onConfigChange()"
                ></textarea>
            </div>

            <div class="controls-panel">
                <div class="control-group">
                    <span class="control-label">File Operations</span>
                    <button class="btn btn-primary" onclick="loadConfig()" id="loadBtn">
                        ↻ Reload from File
                    </button>
                    <button class="btn btn-success" onclick="saveConfig()" id="saveBtn">
                        💾 Save to File
                    </button>
                    <button class="btn btn-warning" onclick="validateJson()" id="validateBtn">
                        ✓ Validate JSON
                    </button>
                </div>

                <div class="control-group">
                    <span class="control-label">Utilities</span>
                    <button class="btn btn-primary" onclick="formatJson()">
                        🎨 Format JSON
                    </button>
                    <button class="btn btn-primary" onclick="downloadConfig()">
                        ⬇️ Download Copy
                    </button>
                    <button class="btn btn-danger" onclick="resetConfig()">
                        ⚠️ Reset Changes
                    </button>
                </div>

                <div class="control-group">
                    <span class="control-label">Status</span>
                    <div class="status-info" id="statusInfo">
                        <div class="status-row">
                            <span class="status-label">File:</span>
                            <span class="status-value" id="statusFile">-</span>
                        </div>
                        <div class="status-row">
                            <span class="status-label">Size:</span>
                            <span class="status-value" id="statusSize">-</span>
                        </div>
                        <div class="status-row">
                            <span class="status-label">Valid:</span>
                            <span class="status-value" id="statusValid">-</span>
                        </div>
                        <div class="status-row">
                            <span class="status-label">Modified:</span>
                            <span class="status-value" id="statusModified">-</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuration management
        const API_BASE = 'http://localhost:5001/api';
        let currentConfig = null;
        let originalContent = '';
        let isConnected = false;
        let saveTimeout = null;
        let lastTimestamp = 0;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            checkConnection();
            loadConfigList();
            
            // Get config from URL parameter
            const urlParams = new URLSearchParams(window.location.search);
            const configParam = urlParams.get('config');
            if (configParam) {
                document.getElementById('configSelect').value = configParam;
                loadSelectedConfig();
            }
            
            // Poll for external changes
            setInterval(checkForUpdates, 3000);
        });

        async function checkConnection() {
            try {
                const response = await fetch(`${API_BASE}/discover`);
                if (response.ok) {
                    setConnectionStatus(true);
                } else {
                    setConnectionStatus(false);
                }
            } catch (error) {
                setConnectionStatus(false);
            }
        }

        function setConnectionStatus(connected) {
            isConnected = connected;
            const statusElement = document.getElementById('syncStatus');
            const textElement = document.getElementById('syncText');
            
            if (connected) {
                statusElement.className = 'sync-status connected';
                textElement.textContent = 'Connected';
            } else {
                statusElement.className = 'sync-status disconnected';
                textElement.textContent = 'Disconnected';
            }
            
            // Enable/disable buttons
            const buttons = document.querySelectorAll('.btn');
            buttons.forEach(btn => {
                btn.disabled = !connected;
            });
        }

        async function loadConfigList() {
            if (!isConnected) return;

            try {
                const response = await fetch(`${API_BASE}/discover`);
                if (response.ok) {
                    const configs = await response.json();
                    const select = document.getElementById('configSelect');
                    
                    // Clear existing options except first
                    select.innerHTML = '<option value="">Select a configuration file...</option>';
                    
                    // Add discovered configs
                    Object.keys(configs).sort().forEach(configName => {
                        const option = document.createElement('option');
                        option.value = configName;
                        option.textContent = `${configName}.json`;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                showNotification('Failed to load configuration list', 'error');
            }
        }

        function loadSelectedConfig() {
            const configName = document.getElementById('configSelect').value;
            if (configName) {
                currentConfig = configName;
                document.getElementById('configTitle').textContent = `Configure ${configName}`;
                document.getElementById('configEditor').style.display = 'grid';
                loadConfig();
                updateStatus();
            } else {
                document.getElementById('configEditor').style.display = 'none';
                document.getElementById('configTitle').textContent = 'Universal Configuration';
            }
        }

        async function loadConfig() {
            if (!currentConfig || !isConnected) return;

            try {
                const response = await fetch(`${API_BASE}/config/${currentConfig}`);
                if (response.ok) {
                    const config = await response.json();
                    
                    if (config.error) {
                        showNotification(config.error, 'error');
                        return;
                    }
                    
                    const formatted = JSON.stringify(config, null, 2);
                    document.getElementById('jsonEditor').value = formatted;
                    originalContent = formatted;
                    
                    showNotification('Configuration loaded', 'success');
                    
                    // Update timestamp
                    await updateTimestamp();
                    updateStatus();
                } else {
                    throw new Error('Failed to load configuration');
                }
            } catch (error) {
                showNotification('Failed to load: ' + error.message, 'error');
            }
        }

        async function saveConfig() {
            if (!currentConfig || !isConnected) {
                showNotification('Cannot save - no configuration selected or disconnected', 'error');
                return;
            }

            const content = document.getElementById('jsonEditor').value;
            
            // Validate JSON first
            try {
                const parsedConfig = JSON.parse(content);
            } catch (error) {
                showNotification('Invalid JSON - cannot save', 'error');
                return;
            }

            try {
                const parsedConfig = JSON.parse(content);
                const response = await fetch(`${API_BASE}/config/${currentConfig}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(parsedConfig)
                });
                
                if (response.ok) {
                    const result = await response.json();
                    if (result.error) {
                        showNotification(result.error, 'error');
                    } else {
                        originalContent = content;
                        showNotification('Configuration saved successfully', 'success');
                        await updateTimestamp();
                        updateStatus();
                    }
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                showNotification('Save failed: ' + error.message, 'error');
            }
        }

        async function updateTimestamp() {
            if (!currentConfig || !isConnected) return;
            
            try {
                const response = await fetch(`${API_BASE}/config/${currentConfig}/timestamp`);
                if (response.ok) {
                    const data = await response.json();
                    lastTimestamp = data.timestamp;
                }
            } catch (error) {
                // Ignore timestamp errors
            }
        }

        async function checkForUpdates() {
            if (!currentConfig || !isConnected) return;
            
            try {
                const response = await fetch(`${API_BASE}/config/${currentConfig}/timestamp`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.timestamp > lastTimestamp) {
                        // File modified externally
                        lastTimestamp = data.timestamp;
                        
                        if (confirm('Configuration file was modified externally. Reload changes?')) {
                            loadConfig();
                        }
                    }
                }
            } catch (error) {
                // Ignore polling errors
            }
        }

        function onConfigChange() {
            // Debounced auto-validation
            if (saveTimeout) {
                clearTimeout(saveTimeout);
            }
            
            saveTimeout = setTimeout(() => {
                updateStatus();
            }, 500);
        }

        function validateJson() {
            const content = document.getElementById('jsonEditor').value;
            
            try {
                JSON.parse(content);
                showNotification('JSON is valid ✓', 'success');
                return true;
            } catch (error) {
                showNotification(`JSON Error: ${error.message}`, 'error');
                return false;
            }
        }

        function formatJson() {
            const content = document.getElementById('jsonEditor').value;
            
            try {
                const parsed = JSON.parse(content);
                const formatted = JSON.stringify(parsed, null, 2);
                document.getElementById('jsonEditor').value = formatted;
                showNotification('JSON formatted', 'success');
                updateStatus();
            } catch (error) {
                showNotification('Cannot format - invalid JSON', 'error');
            }
        }

        function downloadConfig() {
            if (!currentConfig) return;
            
            const content = document.getElementById('jsonEditor').value;
            const timestamp = new Date().toISOString().slice(0, 19).replace(/[:.]/g, '-');
            const filename = `${currentConfig}-${timestamp}.json`;
            
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            URL.revokeObjectURL(url);
            showNotification(`Downloaded as ${filename}`, 'success');
        }

        function resetConfig() {
            if (confirm('Reset all changes to last saved version?')) {
                document.getElementById('jsonEditor').value = originalContent;
                showNotification('Changes reset', 'info');
                updateStatus();
            }
        }

        function updateStatus() {
            const content = document.getElementById('jsonEditor').value;
            const hasChanges = content !== originalContent;
            
            // Update file info
            document.getElementById('statusFile').textContent = currentConfig ? `${currentConfig}.json` : '-';
            document.getElementById('statusSize').textContent = content ? `${content.length} chars` : '-';
            document.getElementById('statusModified').textContent = hasChanges ? 'Yes' : 'No';
            
            // Validate JSON
            try {
                JSON.parse(content);
                document.getElementById('statusValid').textContent = '✓ Valid';
                document.getElementById('statusValid').style.color = '#00ff64';
            } catch (error) {
                document.getElementById('statusValid').textContent = '✗ Invalid';
                document.getElementById('statusValid').style.color = '#ff6464';
            }
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type}`;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 4000);
        }

        // Check connection periodically
        setInterval(checkConnection, 10000);
    </script>
</body>
</html>
