<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Generator. - Beacon HFT Platform</title>
    
    <!-- Import shared design system -->
    <link rel="stylesheet" href="../../shared/css/beacon-design-system.css">
    <link rel="stylesheet" href="./styles/dataset-generator.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Demo Mode Banner -->
    <div class="demo-banner">DATASET GENERATOR IS RUNNING IN DEMO MODE</div>
    
    <!-- Professional Fixed Header -->
    <header class="beacon-page-header">
        <nav class="beacon-page-nav">
            <div class="beacon-brand-header">
                <a href="../../../index.html" class="beacon-brand-main">Beacon.</a>
                <span class="beacon-brand-separator">|</span>
                <h1 class="beacon-page-title">Dataset Generator.</h1>
            </div>
            <div class="beacon-nav-actions">
                <a href="../../command-center/" class="beacon-nav-back">
                    <span class="nav-arrow">←</span>
                    <span>Command Center</span>
                </a>
            </div>
        </nav>
    </header>

    <!-- Main App Content -->
    <main class="app-container">
        <!-- Hero Section -->
        <section class="doc-hero">
            <h1>Dataset Generator.</h1>
            <p>Generate Custom Datasets. Maximum Flexibility. Smart Defaults. Native Exchange Format.</p>
        </section>

        <!-- Main Panels Layout -->
        <section class="main-panels">
            <!-- Dataset Configuration Panel -->
            <div class="dataset-config-panel" data-panel="dataset-config">
                <div class="panel-header" onclick="DatasetGenerator.togglePanel('dataset-config')">
                    <h3 class="panel-title">Configuration</h3>
                    <div class="panel-collapse-indicator">−</div>
                </div>
                <div class="panel-content">
                    <div class="dataset-row">
                        <div class="form-group">
                            <input type="number" class="form-input required-empty" id="numMessagesInput" 
                                   placeholder="# Msgs" min="1" 
                                   oninput="DatasetGenerator.validateNumMessages()" 
                                   onblur="DatasetGenerator.validateNumMessages()">
                        </div>
                        <div class="form-group">
                            <select class="form-select" id="exchangeSelect">
                                <option value="nasdaq">NASDAQ</option>
                                <option value="nyse">NYSE</option>
                                <option value="cme">CME</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <input type="text" class="form-input save-as-empty" id="saveAsInput" 
                               placeholder="Save As:" maxlength="50" 
                               oninput="DatasetGenerator.validateForm()">
                    </div>
                    
                    <button class="generate-btn" id="generateBtn" 
                            onclick="DatasetGenerator.generateDataset()" disabled>
                        Generate
                    </button>
                </div>
            </div>

            <!-- Product Configuration Panel -->
            <div class="product-config-panel" data-panel="product-config">
                <div class="panel-header" onclick="DatasetGenerator.togglePanel('product-config')">
                    <h3 class="panel-title">Symbols</h3>
                    <div class="panel-collapse-indicator">−</div>
                </div>
                <div class="panel-content">
                    <div class="product-panel-header">
                        <div class="symbol-input-container">
                            <input type="text" class="add-symbol-input" id="symbolInput" 
                                   placeholder="Enter a Symbol" maxlength="10"
                                   oninput="DatasetGenerator.validateSymbolInput(event)" 
                                   onkeydown="DatasetGenerator.handleSymbolInput(event)">
                            <div class="symbol-error-msg" id="symbolError">Symbol already exists</div>
                        </div>
                        
                        <div class="allocation-display">
                            <span class="allocation-percentage" id="allocationPercentage">100%</span>
                        </div>
                    </div>

                    <div id="productsContainer">
                        <!-- Product cards will be dynamically added here -->
                    </div>
                </div>
            </div>
        </section>
    </main>
    
    <!-- Scripts -->
    <script src="../../../data/market_data.js"></script>
    <script>
        // Force override with working market data structure
        console.log('🔧 Setting up guaranteed working market data...');
        
        window.MARKET_DATA = {
            'AAPL': {
                name: 'Apple Inc.',

                priceRange: { min: 185.00, max: 200.00 },
                quantityRange: { min: 100, max: 2000 },
                spreadPercent: 0.02,
                category: "mega-cap-tech"
            },
            'MSFT': {
                name: 'Microsoft Corporation',
                sector: 'Technology',
                simulationProfile: { basePrice: 420.00, volatilityFactor: 0.02, avgDailyVolume: 20000000 },
                priceRange: { min: 405.00, max: 435.00 },
                quantityRange: { min: 100, max: 1500 },
                spreadPercent: 0.02,
                category: "mega-cap-tech"
            },
            'NVDA': {
                name: 'NVIDIA Corporation',
                sector: 'Technology',
                simulationProfile: { basePrice: 890.00, volatilityFactor: 0.04, avgDailyVolume: 45000000 },
                priceRange: { min: 860.00, max: 920.00 },
                quantityRange: { min: 25, max: 500 },
                spreadPercent: 0.04,
                category: "mega-cap-tech"
            },
            'SPY': {
                name: 'SPDR S&P 500 ETF',
                sector: 'ETF',
                simulationProfile: { basePrice: 460.00, volatilityFactor: 0.01, avgDailyVolume: 60000000 },
                priceRange: { min: 450.00, max: 470.00 },
                quantityRange: { min: 100, max: 3000 },

            },
            'TSLA': {

                simulationProfile: { basePrice: 250.00, volatilityFactor: 0.06, avgDailyVolume: 75000000 },
                priceRange: { min: 230.00, max: 270.00 },
                quantityRange: { min: 50, max: 1000 },
                spreadPercent: 0.06,

            },
            'QQQ': {
                name: 'Invesco QQQ Trust',
                sector: 'ETF',
                simulationProfile: { basePrice: 386.00, volatilityFactor: 0.01, avgDailyVolume: 40000000 },
                priceRange: { min: 375.00, max: 395.00 },
                quantityRange: { min: 100, max: 2500 },

            // Add common symbols that users might try
            'AMZN': {
                name: 'Amazon.com Inc.',
                sector: 'Consumer Discretionary',

                spreadPercent: 0.025,
                category: "mega-cap-tech"
            }
        };
        
        // Force override MarketDataUtils
        window.MarketDataUtils = {
            getSymbol: function(ticker) {
                const symbol = ticker.toUpperCase();
                console.log(`🔍 MarketDataUtils.getSymbol called for ${symbol}`);
                const result = window.MARKET_DATA[symbol];
                if (result) {
                    console.log(`✅ Found data for ${symbol}:`, result);
                    return result;
                } else {
                    console.log(`❌ No data found for ${symbol}. Available symbols:`, Object.keys(window.MARKET_DATA));
                    return null;
                }
            },
            getAllSymbols: function() {
                return Object.keys(window.MARKET_DATA);
            }
        };
        
        console.log('🎯 Market data setup complete. Available symbols:', Object.keys(window.MARKET_DATA));
        
        // Test the lookup immediately
        console.log('🧪 Testing AAPL lookup:', window.MarketDataUtils.getSymbol('AAPL'));
        console.log('🧪 Testing AMZN lookup:', window.MarketDataUtils.getSymbol('AMZN'));
    </script>
    <script src="./scripts/dataset-generator.js"></script>
</body>
</html>
