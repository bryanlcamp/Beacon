<body>
    <!-- Demo Mode Banner -->
    <div class="demo-banner">DATASET GENERATOR IS RUNNING IN DEMO MODE</div>
    
    <!-- Professional Fixed Header -->
    <header class="beacon-page-header">
        <nav class="beacon-page-nav">
            <div class="beacon-brand-header">
                <a href="../../../index.html" class="beacon-brand-main">Beacon.</a>
                <span class="beacon-brand-separator">|</span>
                <h1 class="beacon-page-title">Dataset Generator.</h1>
            </div>
            <div class="beacon-nav-actions">
                <a href="../../command-center/" class="beacon-nav-back">
                    <span class="nav-arrow">←</span>
                    <span>Command Center</span>
                </a>
            </div>
        </nav>
    </header>

    <!-- Main App Content -->
    <main class="app-container">
        <!-- Hero Section -->
        <section class="doc-hero">
            <h1>Dataset Generator.</h1>
            <p>Generate Custom Datasets. Maximum Flexibility. Smart Defaults. Native Exchange Format.</p>
        </section>

        <!-- Main Panels Layout -->
        <section class="main-panels">
            <!-- Dataset Configuration Panel -->
            <div class="dataset-config-panel" data-panel="dataset-config">
                <div class="panel-header" onclick="DatasetGenerator.togglePanel('dataset-config')">
                    <div class="panel-header-controls" onclick="event.stopPropagation()">
                        <div class="panel-header-group">
                            <input type="number" 
                                   id="numMessagesInput" 
                                   class="panel-header-input" 
                                   placeholder="Msg Cnt" 
                                   min="1" 
                                   max="10000000"
                                   oninput="DatasetGenerator.handleNumMessagesInput(event)"
                                   onchange="DatasetGenerator.validateNumMessages()"
                                   onkeydown="DatasetGenerator.uiController.handleNumericKeydown(event)">
                        </div>
                        <div class="panel-header-group">
                            <!-- FIXED: Put the SELECT back, not input! -->
                            <select id="exchangeSelect" class="panel-header-select" onchange="DatasetGenerator.handleAnyInput(event)">
                                <option value="NASDAQ">NASDAQ</option>
                                <option value="NYSE">NYSE</option>
                                <option value="CME">CME</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="panel-content">
                    <!-- Config Load/Save Row - FIRST LINE - FIXED -->
                    <div class="config-management-row">
                        <div class="config-combo-container">
                            <select class="config-combo" id="configSelect" onchange="DatasetGenerator.handleConfigSelection()">
                                <option value="" disabled selected>Select or create config...</option>
                            </select>
                            <input type="text" class="config-input" id="configInput" 
                                   placeholder="Enter config name (letters, numbers, _ - only)"
                                   style="display: none;"
                                   onkeydown="DatasetGenerator.handleConfigInputKey(event)"
                                   onblur="DatasetGenerator.handleConfigInputBlur()">
                        </div>
                        <button class="config-new-btn" id="configNewBtn" 
                                onclick="DatasetGenerator.createNewConfig()" 
                                title="Create new config">+</button>
                        <button class="config-save-btn" id="configSaveBtn" 
                                onclick="DatasetGenerator.saveCurrentConfig()" 
                                title="Save current config"
                                style="display: none;">💾</button>
                        <button class="config-cancel-btn" id="configCancelBtn" 
                                onclick="DatasetGenerator.cancelNewConfig()" 
                                title="Cancel and go back to dropdown"
                                style="display: none;">✕</button>
                    </div>

                    <div class="dataset-row">
                        <!-- REMOVED: Market Sentiment control -->
                        
                        <div class="form-group">
                            <input type="text" class="form-input save-as-empty" id="saveAsInput" 
                                   placeholder="Save As:" maxlength="50" 
                                   oninput="DatasetGenerator.validateSaveAs(event)">
                        </div>
                        
                        <button class="generate-btn" id="generateBtn" 
                                onclick="DatasetGenerator.generateDataset()" disabled>
                            Generate
                        </button>
                    </div>
                </div>
            </div>

            <!-- Product Configuration Panel -->
            <div class="product-config-panel" data-panel="product-config">
                <div class="panel-header" onclick="DatasetGenerator.togglePanel('product-config')">
                    <div class="panel-header-symbol-controls" onclick="event.stopPropagation()">
                        <div class="symbol-input-container">
                            <input type="text" class="add-symbol-input" id="symbolInput" 
                                   placeholder="Enter a Product" maxlength="10"
                                   style="font-style: italic;"
                                   oninput="DatasetGenerator.validateSymbolInput(event)" 
                                   onkeydown="DatasetGenerator.handleSymbolInput(event)">
                            <div class="symbol-error-msg" id="symbolError">Symbol already exists</div>
                        </div>
                    </div>
                    
                    <div class="allocation-display">
                        <span class="allocation-percentage" id="allocationPercentage">0% Allocated</span>
                    </div>
                </div>
                <div class="panel-content">
                    <div id="productsContainer">
                        <!-- Product cards will be dynamically added here -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Scripts -->
    <script src="../../shared/js/market-data-utils.js"></script>
    <script type="module" src="scripts/dataset-generator.js"></script>
    
    <!-- FORCE red adorner on page load for symbol input -->
    <script>
        // Immediately force red adorner when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(() => {
                const symbolInput = document.getElementById('symbolInput');
                if (symbolInput) {
                    symbolInput.classList.remove('symbols-added');
                    symbolInput.classList.add('no-symbols-warning');
                    console.log('🔴 DOM READY: Forced red adorner for symbol input');
                }
            }, 50);
        });
    </script>
</body>
</html>
