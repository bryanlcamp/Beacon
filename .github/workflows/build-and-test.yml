name: "Beacon Professional Build and Test"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  BUILD_TYPE: "Debug"
  BUILD_VERSION: "v1.0"
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build-and-test:
    name: "Professional Build and Test"
    runs-on: ubuntu-latest
    
    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: "System Information"
        run: |
          echo "=== BEACON PROFESSIONAL CI/CD PIPELINE ==="
          echo "Working Directory: $(pwd)"
          echo "Git Branch: $(git branch --show-current)"
          echo "Latest Commit: $(git log --oneline -1)"
          echo "Build Time: $(date)"
          echo "Build Version: ${{ env.BUILD_VERSION }}"
          echo "Build Number: ${{ env.BUILD_NUMBER }}"

      - name: "Install Dependencies"
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential python3 python3-pip cmake

      - name: "Clean Previous Builds"
        run: |
          echo "Cleaning previous builds..."
          rm -rf build* || true
          python3 beacon-build.py --clean || true

      - name: "Build with Professional System"
        run: |
          echo "Building with professional Python build system..."
          python3 beacon-build.py --debug

      - name: "Verify Build Results"
        run: |
          echo "Verifying build results..."
          ls -la "build/src/apps/"
          
          # Check for required binaries
          test -f "build/src/apps/generator/generator" || exit 1
          test -f "build/src/apps/matching_engine/matching_engine" || exit 1
          
          echo "Build verification successful"

      - name: "Test Professional Interfaces"
        run: |
          echo "Testing professional system interfaces..."
          
          # Test system validation with dry-run
          python3 beacon-run.py --help
          python3 beacon-run.py -i "config/system/startBeacon.json" --dry-run
          
          # Test build system
          python3 beacon-build.py --help
          
          # Test config management
          python3 beacon-config.py --help
          
          echo "Professional system validation complete"

      - name: "Archive Build Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: "beacon-professional-binaries"
          path: |
            build/src/apps/generator/generator
            build/src/apps/matching_engine/matching_engine
            build/src/apps/client_algorithm/AlgoTwapProtocol
            build/src/apps/playback/playbook
            beacon-run.py
            beacon-build.py
            beacon-config.py
          retention-days: 7