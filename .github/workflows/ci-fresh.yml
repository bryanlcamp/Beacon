name: Beacon Professional CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Debug
  BUILD_VERSION: v1.0
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build-debug-fresh:
    name: Fresh Debug Build (No Cache)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (FRESH)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Professional System Information
        run: |
          echo "🚀 BEACON PROFESSIONAL CI/CD PIPELINE"
          echo "📂 Working Directory: $(pwd)"
          echo "🌿 Git Branch: $(git branch --show-current)"
          echo "📝 Latest Commit: $(git log --oneline -1)"
          echo "🕒 Build Time: $(date)"
          echo "📦 Build Version: ${{ env.BUILD_VERSION }}"
          echo "🔢 Build Number: ${{ env.BUILD_NUMBER }}"
          
          # Clean previous builds
          echo "🧹 Cleaning previous builds..."
          rm -rf build* || true

      - name: Install dependencies (FRESH)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential python3 python3-pip wget curl
          
          # Install newer CMake with verification
          CMAKE_VERSION="3.28.0"
          echo "🔽 Installing CMake ${CMAKE_VERSION}..."
          if wget -O cmake.sh "https://cmake.org/files/v3.28/cmake-${CMAKE_VERSION}-linux-x86_64.sh" 2>/dev/null; then
            sudo sh cmake.sh --skip-license --exclude-subdir --prefix=/usr/local
            rm cmake.sh
            echo "✅ CMake installation successful"
          else
            echo "⚠️ Fallback: using system CMake"
            sudo apt-get install -y cmake
          fi
          
          # Verify installation
          cmake --version
          gcc --version

      - name: Clean all previous builds (FRESH)
        run: |
          echo "🧹 Final cleanup before build..."
          rm -rf build* || true
          python3 scripts/ci_cd/beacon-clean-all.py || echo "Clean script not critical"
          
          # Use professional build system for cleaning
          python3 beacon-build.py --clean || echo "Professional clean completed"



      - name: Professional Build System (FRESH)
        run: |
          echo "🔨 Using professional Python build system..."
          python3 beacon-build.py --debug
          echo "✅ Professional build completed"

      - name: Verify Build Results (FRESH)
        run: |
          echo "🔍 Verify professional build results..."
          ls -la build/src/apps/*/
          test -f build/src/apps/generator/generator && echo "✅ Generator built successfully"
          test -f build/src/apps/matching_engine/matching_engine && echo "✅ Matching engine built successfully"
          
          # Test our professional interface
          python3 beacon-run.py --help && echo "✅ Main interface working"
          python3 beacon-build.py --help && echo "✅ Build system working"

      - name: Professional System Integration Test
        run: |
          echo "🧪 Testing professional system integration..."
          
          # Test main system with dry-run mode
          python3 beacon-run.py -i config/system/startBeacon.json --dry-run && echo "✅ Main system validation passed"
          
          # Test config management
          python3 beacon-config.py --help > /dev/null && echo "✅ Config management working"
          
          # Test build system
          python3 beacon-build.py --help > /dev/null && echo "✅ Build system working"
          
          # Test demo system
          python3 scripts/beacon-demo-system.py > /dev/null && echo "✅ Demo system working"
          
          echo "🎉 Professional Beacon system fully validated!"

      - name: Archive Fresh Binaries
        uses: actions/upload-artifact@v4
        with:
          name: beacon-professional-debug-binaries
          path: |
            build/src/apps/generator/generator
            build/src/apps/matching_engine/matching_engine
            build/src/apps/client_algorithm/AlgoTwapProtocol
            build/src/apps/playback/playback
            beacon-run.py
            beacon-build.py
            beacon-config.py
          retention-days: 7