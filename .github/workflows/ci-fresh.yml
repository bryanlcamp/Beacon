name: Beacon Professional CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CACHE_VERSION: v7.0
  BUILD_TIMESTAMP: ${{ github.run_number }}
  ACTIONS_RUNNER_DEBUG: true

jobs:
  build-debug-fresh:
    name: Fresh Debug Build (No Cache)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code (FRESH)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: 🚀 EXTREME DEBUGGING v7.0 - SHOW EVERYTHING 🚀
        run: |
          echo "🚀 EXTREME DEBUGGING v7.0 - SHOW EXACTLY WHAT GITHUB ACTIONS SEES"
          
          # Show working directory and git status
          echo "📂 Working Directory: $(pwd)"
          echo "🌿 Git Branch: $(git branch --show-current)"
          echo "📋 Git Status:"
          git status --porcelain
          echo "🔗 Git Remote:"
          git remote -v
          echo "📝 Last Commit:"
          git log --oneline -1
          
          # Nuclear cache clearing
          rm -rf ~/.cache/cmake* ~/.cmake* || true
          rm -rf ~/build* || true  
          rm -rf build* || true
          rm -rf .cache .cmake || true
          find . -name "CMakeCache.txt" -delete || true
          find . -name "CMakeFiles" -type d -exec rm -rf {} + || true
          find . -name ".git" -prune -o -name "*cmake*" -type d -exec rm -rf {} + || true
          
          echo "🔍 CRITICAL DEBUGGING: ConfigFileParser.h content:"
          echo "--- Full file info ---"
          ls -la src/apps/generator/include/ConfigFileParser.h
          echo "--- File checksum ---"
          md5sum src/apps/generator/include/ConfigFileParser.h || true
          echo "--- Lines 115-135 (around the problem area) ---"
          sed -n '115,135p' src/apps/generator/include/ConfigFileParser.h
          echo "--- Search for 'PriceRange PriceRange' (OLD bad version) ---"
          grep -n "PriceRange PriceRange" src/apps/generator/include/ConfigFileParser.h || echo "✅ OLD version not found (good!)"
          echo "--- Search for 'priceRange' (NEW good version) ---"
          grep -n "priceRange" src/apps/generator/include/ConfigFileParser.h || echo "❌ NEW version not found (bad!)"
          
          echo "--- CMakeLists.txt v4.0 check ---"
          grep -i "v4.0\|MEGA-FIXED\|Cache Destroyer" src/apps/client_algorithm/CMakeLists.txt || echo "❌ v4.0 markers not found!"
          
          echo "--- Source files verification ---"
          ls -la src/apps/client_algorithm/src/ || echo "❌ Client algorithm src not found!"
          
          echo "📅 Extreme Version: ${{ env.CACHE_VERSION }}"
          echo "🔢 Build: ${{ env.BUILD_TIMESTAMP }}"
          echo "🕒 Time: $(date)"

      - name: Install dependencies (FRESH)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential python3 python3-pip wget curl
          
          # Install newer CMake with verification
          CMAKE_VERSION="3.28.0"
          echo "🔽 Installing CMake ${CMAKE_VERSION}..."
          if wget -O cmake.sh "https://cmake.org/files/v3.28/cmake-${CMAKE_VERSION}-linux-x86_64.sh" 2>/dev/null; then
            sudo sh cmake.sh --skip-license --exclude-subdir --prefix=/usr/local
            rm cmake.sh
            echo "✅ CMake installation successful"
          else
            echo "⚠️ Fallback: using system CMake"
            sudo apt-get install -y cmake
          fi
          
          # Verify installation
          cmake --version
          gcc --version

      - name: Clean all previous builds (FRESH)
        run: |
          echo "🧹 Final cleanup before build..."
          rm -rf build* || true
          python3 scripts/ci_cd/beacon-clean-all.py || echo "Clean script not critical"
          
          # Use professional build system for cleaning
          python3 beacon-build.py --clean || echo "Professional clean completed"

      - name: 🚑 EMERGENCY FIX - Force correct ConfigFileParser.h 🚑
        run: |
          echo "🚑 EMERGENCY: Force-fixing ConfigFileParser.h if needed"
          
          # Check if we still have the bad version
          if grep -q "PriceRange PriceRange" src/apps/generator/include/ConfigFileParser.h; then
            echo "❌ DETECTED OLD VERSION! Force-patching..."
            sed -i 's/PriceRange PriceRange;/PriceRange priceRange;/g' src/apps/generator/include/ConfigFileParser.h
            sed -i 's/QuantityRange QuantityRange;/QuantityRange quantityRange;/g' src/apps/generator/include/ConfigFileParser.h
            sed -i 's/PreviousDay PreviousDay;/PreviousDay previousDay;/g' src/apps/generator/include/ConfigFileParser.h
            echo "✅ PATCHED! New content:"
            sed -n '120,130p' src/apps/generator/include/ConfigFileParser.h
          else
            echo "✅ ConfigFileParser.h looks correct - no patching needed"
          fi

      - name: Professional Build System (FRESH)
        run: |
          echo "🔨 Using professional Python build system..."
          python3 beacon-build.py --debug
          echo "✅ Professional build completed"

      - name: Verify Build Results (FRESH)
        run: |
          echo "🔍 Verify professional build results..."
          ls -la build/src/apps/*/
          test -f build/src/apps/generator/generator && echo "✅ Generator built successfully"
          test -f build/src/apps/matching_engine/matching_engine && echo "✅ Matching engine built successfully"
          
          # Test our professional interface
          python3 beacon-run.py --help && echo "✅ Main interface working"
          python3 beacon-build.py --help && echo "✅ Build system working"

      - name: Professional System Integration Test
        run: |
          echo "🧪 Testing professional system integration..."
          
          # Test main system with dry-run mode
          python3 beacon-run.py -i config/system/startBeacon.json --dry-run && echo "✅ Main system validation passed"
          
          # Test config management
          python3 beacon-config.py --help > /dev/null && echo "✅ Config management working"
          
          # Test build system
          python3 beacon-build.py --help > /dev/null && echo "✅ Build system working"
          
          # Test demo system
          python3 scripts/beacon-demo-system.py > /dev/null && echo "✅ Demo system working"
          
          echo "🎉 Professional Beacon system fully validated!"

      - name: Archive Fresh Binaries
        uses: actions/upload-artifact@v4
        with:
          name: beacon-professional-debug-binaries
          path: |
            build/src/apps/*/
            !build/src/apps/*/*.o
            !build/src/apps/*/CMakeFiles/
            beacon-run.py
            beacon-build.py
            beacon-config.py
          retention-days: 7