<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signal Lost - Beacon</title>
    
    <!-- Import shared design system -->
    <link rel="stylesheet" href="web/shared/css/beacon-design-system.css">
    
    <style>
        /* 404 page specific styling */
        .error-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: -4px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #00aaff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0.9;
            text-shadow: 0 0 30px rgba(0, 170, 255, 0.3);
            animation: beaconPulse 3s ease-in-out infinite;
        }
        
        @keyframes beaconPulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; text-shadow: 0 0 40px rgba(0, 170, 255, 0.5); }
        }
        
        .error-message {
            font-size: 2.5rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        
        .error-description {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }
        
        .error-actions {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .error-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 28px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .error-link:hover {
            background: rgba(0, 170, 255, 0.1);
            border-color: rgba(0, 170, 255, 0.4);
            transform: translateY(-2px);
        }
        
        .error-link.primary {
            background: rgba(0, 170, 255, 0.1);
            border-color: rgba(0, 170, 255, 0.3);
        }
        
        .error-link.primary:hover {
            background: rgba(0, 170, 255, 0.2);
            border-color: #00aaff;
        }
        
        .error-link .arrow {
            color: #00aaff;
            font-weight: 700;
            transition: transform 0.2s ease;
        }
        
        .error-link:hover .arrow {
            transform: translateX(2px);
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }
            
            .error-message {
                font-size: 2rem;
            }
            
            .error-description {
                font-size: 1rem;
                margin-bottom: 32px;
            }
            
            .error-actions {
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }
            
            .error-link {
                min-width: 200px;
                justify-content: center;
            }
        }
    </style>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-message">Signal Lost</h1>
        <p class="error-description">
            The beacon couldn't locate the requested page. The path may have changed or doesn't exist.
        </p>
        
        <div class="error-actions">
            <a href="/" class="error-link primary">
                <span class="arrow">←</span>
                <span>Return Home</span>
            </a>
            
            <a href="/web/command-center/" class="error-link">
                <span>Command Center</span>
                <span class="arrow">→</span>
            </a>
            
            <a href="/web/command-center/setup/what-is-beacon.html" class="error-link">
                <span>What is Beacon?</span>
                <span class="arrow">→</span>
            </a>
        </div>
    </div>
    
    <script>
        // Demo mode detection for consistency
        const isDemo = window.location.hostname.includes('github.io') || 
                      window.location.hostname.includes('githubusercontent.com');
        
        if (isDemo) {
            document.body.classList.add('demo-mode');
        }
        
        // Smart navigation based on current location
        document.addEventListener('DOMContentLoaded', function() {
            const currentPath = window.location.pathname;
            
            // If we're in a subfolder, adjust all links
            if (currentPath.includes('/web/')) {
                const homeLink = document.querySelector('a[href="/"]');
                if (homeLink) {
                    const depth = (currentPath.match(/\//g) || []).length - 1;
                    homeLink.href = '../'.repeat(depth) || './';
                }
                
                const commandLink = document.querySelector('a[href="/web/command-center/"]');
                if (commandLink) {
                    if (currentPath.includes('/command-center/')) {
                        commandLink.href = './';
                    } else {
                        commandLink.href = '../command-center/';
                    }
                }
                
                const whatIsLink = document.querySelector('a[href="/web/command-center/setup/what-is-beacon.html"]');
                if (whatIsLink) {
                    if (currentPath.includes('/command-center/')) {
                        whatIsLink.href = './setup/what-is-beacon.html';
                    } else {
                        whatIsLink.href = '../command-center/setup/what-is-beacon.html';
                    }
                }
            }
        });
    </script>
</body>
</html>
